<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <title>SceneTalk 英语口语练习</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        /* 左右双栏容器 */
        .container {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }
        .left-panel, .right-panel {
            flex: 1; /* 左右两栏宽度相等 */
        }
        /* 场景选择 */
        .scene-bar {
            margin-bottom: 20px;
            text-align: center;
        }
        select {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        /* 聊天框 & 翻译框 统一样式 */
        .chat-box, .translate-box {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 20px;
            height: 450px;
            overflow-y: auto;
            margin-bottom: 25px;
            background: #f9f9f9;
        }
        .chat-box::-webkit-scrollbar, .translate-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-thumb, .translate-box::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
                /* 聊天消息样式（带点击提示） */
        .user-msg {
            text-align: right;
            margin: 10px 0;
            color: #fff;
            background: #3498db;
            padding: 10px 15px;
            border-radius: 15px 15px 0 15px;
            display: inline-block;
            max-width: 70%;
            float: right;
            clear: both;
            cursor: pointer; /* 新增：鼠标移上去变手型，提示可点击 */
            transition: opacity 0.2s ease; /* 新增：hover过渡效果 */
        }
        /* 鼠标悬停时的半透明效果 */
        .user-msg:hover {
            opacity: 0.8;
        }

        .ai-msg {
            text-align: left;
            margin: 10px 0;
            color: #2c3e50;
            background: #ecf0f1;
            padding: 10px 15px;
            border-radius: 15px 15px 15px 0;
            display: inline-block;
            max-width: 70%;
            float: left;
            clear: both;
            cursor: pointer; /* 新增：鼠标移上去变手型，提示可点击 */
            transition: opacity 0.2s ease; /* 新增：hover过渡效果 */
        }
        /* 鼠标悬停时的半透明效果 */
        .ai-msg:hover {
            opacity: 0.8;
        }
        /* 翻译区样式 */
        .right-panel h3 {
            margin-bottom: 10px;
            color: #2c3e50;
            text-align: center;
        }
        .translate-item {
            margin: 12px 0;
            padding: 10px 12px;
            border-radius: 8px;
            background: #e8f4ff;
        }
        .translate-item .source {
            font-size: 14px;
            color: #34495e;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .translate-item .target {
            font-size: 14px;
            color: #2980b9;
        }
        /* 输入区域分区：语音 + 打字 */
        .input-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* 语音输入区域 */
        .voice-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 15px;
            border: 1px solid #ffeded;
            border-radius: 8px;
            background: #fff5f5;
        }
        /* 打字输入区域 */
        .text-input {
            display: flex;
            gap: 10px;
            padding: 15px;
            border: 1px solid #e8f4ff;
            border-radius: 8px;
            background: #f5faff;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        #recordBtn {
            background: #e74c3c;
            color: white;
        }
        #stopBtn {
            background: #3498db;
            color: white;
            display: none;
        }
        #sendTextBtn {
            background: #2ecc71;
            color: white;
        }
        button:hover {
            opacity: 0.9;
        }


        /* 单词查询模块样式 */
        .word-query-section {
            margin-top: 20px;
        }
        .word-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .word-input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .word-input-area button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        .word-input-area button:hover {
            opacity: 0.9;
        }
        .word-result {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 10px;
            background: #f9f9f9;
            min-height: 100px;
        }
        /* 音标样式（带点击提示） */
        .word-phonetic {
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .word-phonetic:hover {
            opacity: 0.8;
        }
        .word-definition {
            margin: 8px 0;
            color: #2c3e50;
            line-height: 1.5;
        }
        
    </style>
</head>
<body>
    <h1>🎤 SceneTalk 英语口语练习</h1>

    <!-- 左右双栏容器 -->
    <div class="container">
        <!-- 左边：原对话功能 -->
        <div class="left-panel">
            <!-- 场景选择 -->
            <div class="scene-bar">
                <select id="sceneSelect">
                    <option value="1">餐厅点餐</option>
                    <option value="2">英语面试</option>
                    <option value="3">酒店入住</option>
                </select>
            </div>

            <!-- 聊天记录框 -->
            <div class="chat-box" id="chatBox"></div>

            <!-- 双输入区域：语音 + 打字 分区 -->
            <div class="input-container">
                <!-- 语音输入区 -->
                <div class="voice-input">
                    <span>🎙️ 语音输入</span>
                    <button id="recordBtn">开始录音</button>
                    <button id="stopBtn">结束并发送</button>
                </div>

                <!-- 打字输入区 -->
                <div class="text-input">
                    <span>⌨️ 打字输入</span>
                    <input type="text" id="textInput" placeholder="输入英文对话，按回车/点击发送">
                    <button id="sendTextBtn">发送</button>
                </div>
            </div>
        </div>

        <!-- 右边：实时翻译区
        <div class="right-panel">
            <h3>📝 实时翻译</h3>
            <div class="translate-box" id="translateBox"></div>
            

        </div> -->

        <div class="right-panel">
            <h3>📝 实时翻译</h3>
            <div class="translate-box" id="translateBox"></div>

            <!-- ✅ 单词查询模块，加在这里！ -->
            <div class="word-query-section">
                <h3>📚 单词查询</h3>
                <div class="word-input-area">
                    <input type="text" id="wordInput" placeholder="输入英文单词查询音标和释义">
                    <button id="searchWordBtn">查询</button>
                </div>
                <div class="word-result" id="wordResult"></div>
            </div>
        </div>

    </div>

    <script>
        // 对话历史维护（格式：[{role: "user/assistant", content: "消息内容"}]）
        let conversationHistory = [];
        // 最大对话历史长度（避免超过模型上下文，10轮足够口语练习）
        const MAX_HISTORY_LENGTH = 10;
        const API_BASE = "http://127.0.0.1:8000";
        let audioContext;
        let currentScene = "restaurant";

        // DOM元素
        const sceneSelect = document.getElementById("sceneSelect");
        const recordBtn = document.getElementById("recordBtn");
        const stopBtn = document.getElementById("stopBtn");
        const textInput = document.getElementById("textInput");
        const sendTextBtn = document.getElementById("sendTextBtn");
        const chatBox = document.getElementById("chatBox");
        const translateBox = document.getElementById("translateBox");

        // 单词查询DOM元素
        const wordInput = document.getElementById("wordInput");
        const searchWordBtn = document.getElementById("searchWordBtn");
        const wordResult = document.getElementById("wordResult");


        // 先判断元素是否获取成功
        if (!wordInput || !searchWordBtn || !wordResult) {
            console.error("❌ 单词查询DOM元素获取失败！检查HTML里的id是否和JS一致");
        } else {
            console.log("✅ 单词查询DOM元素获取成功");
        }

        // 初始化场景（修复版：开场语加入记忆 + 播放语音）
        async function initScene() {
            const sceneChoice = sceneSelect.value;
            try {
                const res = await fetch(`${API_BASE}/init`, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `scene_choice=${sceneChoice}`
                });
                const data = await res.json();
                currentScene = data.scene;
                // 清空聊天和翻译记录
                chatBox.innerHTML = "";
                translateBox.innerHTML = "";
                conversationHistory = [];

                // 👇 核心修复：强制使用后端返回的开场白，不用任何默认兜底
                const welcomeText = data.initial_message;
                conversationHistory.push({ "role": "assistant", "content": welcomeText });
                addMessage(welcomeText, false);
                speakText(welcomeText);
            } catch (err) {
                console.error("初始化场景失败:", err);
                addMessage("Sorry, the scene failed to load. Please refresh.", false);
            }
        }

        // // 添加消息到聊天框 + 同步翻译
        // async function addMessage(text, isUser) {
        //     // 1. 添加到聊天框
        //     const chatDiv = document.createElement("div");
        //     chatDiv.className = isUser ? "user-msg" : "ai-msg";
        //     chatDiv.textContent = text;
        //     chatBox.appendChild(chatDiv);
        //     chatBox.scrollTop = chatBox.scrollHeight;

        //     // 2. 同步翻译并添加到翻译区
        //     await addTranslation(text, isUser);
        // }

        // 添加消息到聊天框 + 同步翻译（带点击重放语音功能）
        async function addMessage(text, isUser) {
            if (!text || text === undefined || text === null) {
                console.log("无效消息，跳过添加");
                return;
            }

            // 1. 创建消息元素
            const chatDiv = document.createElement("div");
            chatDiv.className = isUser ? "user-msg" : "ai-msg";
            chatDiv.textContent = text;
            chatBox.appendChild(chatDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // ✅ 核心新增：给消息添加点击事件，点击重放语音
            chatDiv.addEventListener('click', function() {
                const messageText = this.textContent.trim();
                if (messageText) {
                    speakText(messageText);
                }
            });

            // 2. 同步翻译并添加到翻译区
            await addTranslation(text, isUser);
        }

        // 添加翻译内容到翻译区
        async function addTranslation(text, isUser) {
            try {
                const res = await fetch(`${API_BASE}/translate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `text=${encodeURIComponent(text)}`
                });
                const data = await res.json();
                
                const translateDiv = document.createElement("div");
                translateDiv.className = "translate-item";
                translateDiv.innerHTML = `
                    <div class="source">${isUser ? "你说：" : "AI说："}${text}</div>
                    <div class="target">中文翻译：${data.translation}</div>
                `;
                translateBox.appendChild(translateDiv);
                translateBox.scrollTop = translateBox.scrollHeight;
            } catch (err) {
                console.error("翻译失败:", err);
            }
        }

        // 播放AI语音
        // function speakText(text) {
        //     const utterance = new SpeechSynthesisUtterance(text);
        //     utterance.lang = "en-US";
        //     speechSynthesis.speak(utterance);
        // }

        function speakText(text) {
             // 核心修复：立即清空所有正在播放的语音，解决卡顿变慢
            window.speechSynthesis.cancel();
            
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US";
            // 加速播放（可选，1.0是正常速度，1.1更自然）
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }


        // 2. 单词查询核心函数
        async function searchWord() {
            console.log("📌 点击了查询按钮，开始执行searchWord函数");
            const word = wordInput.value.trim().toLowerCase();
            if (!word) {
                wordResult.innerHTML = "<p style='color:#e74c3c;'>请输入英文单词</p>";
                return;
            }

            wordResult.innerHTML = "<p>查询中...</p>";
            console.log("📌 正在查询单词：", word);

            try {
                // 调用免费词典API（支持CORS，Live Server下可用）
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                console.log("📌 API请求状态：", res.status);
                if (!res.ok) throw new Error("单词未找到");

                const data = await res.json();
                const wordData = data[0];
                console.log("📌 API返回数据：", wordData);

                // 优先取美式音标
                const phonetic = wordData.phonetic || (wordData.phonetics?.find(p => p.text)?.text || "无音标");
                const definitions = wordData.meanings?.[0]?.definitions || [];

                // 构建结果HTML
                let resultHTML = `
                    <div class="word-phonetic" data-word="${word}">
                        🔊 ${phonetic}
                    </div>
                    <div class="word-definitions">
                `;
                definitions.slice(0, 3).forEach((def, index) => {
                    resultHTML += `
                        <div class="word-definition">
                            <strong>${index + 1}.</strong> ${def.definition}
                        </div>
                    `;
                });
                resultHTML += `</div>`;
                wordResult.innerHTML = resultHTML;

                // 给音标绑定点击发音事件
                const phoneticEl = wordResult.querySelector(".word-phonetic");
                if (phoneticEl) {
                    phoneticEl.addEventListener("click", function() {
                        const targetWord = this.dataset.word;
                        console.log("📌 点击音标，播放单词：", targetWord);
                        speakText(targetWord);
                    });
                }

            } catch (err) {
                console.error("❌ 单词查询失败：", err);
                wordResult.innerHTML = `<p style='color:#e74c3c;'>查询失败：未找到单词「${word}」，请检查拼写</p>`;
            }
        }

        // 3. 绑定事件（点击+回车）
        if (searchWordBtn && wordInput) {
            searchWordBtn.addEventListener("click", function() {
                console.log("📌 按钮点击事件触发");
                searchWord();
            });
            wordInput.addEventListener("keypress", function(e) {
                if (e.key === "Enter") {
                    console.log("📌 回车事件触发");
                    searchWord();
                }
            });
            console.log("✅ 单词查询事件绑定成功");
        }      
        // ==================== 1. 语音输入逻辑 ====================
        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);

            source.connect(processor);
            processor.connect(audioContext.destination);

            const recordedData = [];
            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                recordedData.push(new Float32Array(inputData));
            };

            recordBtn.style.display = "none";
            stopBtn.style.display = "inline-block";

            stopBtn.onclick = async () => {
                stream.getTracks().forEach(track => track.stop());
                processor.disconnect();
                source.disconnect();
                audioContext.close();

                const sampleRate = 16000;
                const totalLength = recordedData.reduce((acc, arr) => acc + arr.length, 0);
                const audioBuffer = new Float32Array(totalLength);
                let offset = 0;
                for (const arr of recordedData) {
                    audioBuffer.set(arr, offset);
                    offset += arr.length;
                }

                const resampledBuffer = resample(audioBuffer, audioContext.sampleRate, sampleRate);
                const wavBlob = createWavBlob(resampledBuffer, sampleRate);

                // const formData = new FormData();
                // formData.append("audio", wavBlob, "input.wav");
                // formData.append("scene", currentScene);

                // try {
                //     const res = await fetch(`${API_BASE}/chat`, { method: "POST", body: formData });
                //     const data = await res.json();
                //     addMessage(data.user_text, true);
                //     addMessage(data.ai_text, false);
                //     speakText(data.ai_text);
                // } catch (err) {
                //     addMessage("网络错误，请重试", false);
                //     console.error(err);
                // }


                const formData = new FormData();
                formData.append("audio", wavBlob, "input.wav");
                formData.append("scene", currentScene);
                // 新增：添加对话历史
                formData.append("conversation_history", JSON.stringify(conversationHistory.slice(-MAX_HISTORY_LENGTH)));

                try {
                    const res = await fetch(`${API_BASE}/chat`, { method: "POST", body: formData });
                    const data = await res.json();
                    
                    // 新增：把对话存入记忆
                    conversationHistory.push({"role": "user", "content": data.user_text});
                    conversationHistory.push({"role": "assistant", "content": data.ai_text});
                    
                    addMessage(data.user_text, true);
                    addMessage(data.ai_text, false);
                    speakText(data.ai_text);
                } catch (err) {
                    addMessage("网络错误，请重试", false);
                    console.error(err);
                }
                recordBtn.style.display = "inline-block";
                stopBtn.style.display = "none";
            };
        }

        // ==================== 2. 打字输入逻辑 ====================
        async function sendTextMessage() {
            const userText = textInput.value.trim();
            if (!userText) return;

            // 清空输入框
            textInput.value = "";
            addMessage(userText, true);

            // try {
            //     const res = await fetch(`${API_BASE}/chat_text`, {
            //         method: "POST",
            //         headers: { "Content-Type": "application/x-www-form-urlencoded" },
            //         body: `user_text=${encodeURIComponent(userText)}&scene=${currentScene}`
            //     });
            //     const data = await res.json();
            //     addMessage(data.ai_text, false);
            //     speakText(data.ai_text);
            // } catch (err) {
            //     addMessage("发送失败，请重试", false);
            //     console.error(err);
            // }

            try {
                const res = await fetch(`${API_BASE}/chat_text`, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    // 👇 这一行是修改的：加上对话历史
                    body: `user_text=${encodeURIComponent(userText)}&scene=${currentScene}&conversation_history=${encodeURIComponent(JSON.stringify(conversationHistory.slice(-MAX_HISTORY_LENGTH)))}`
                });
                const data = await res.json();
                
                // 👇 这两行是新增的：把对话存入记忆
                conversationHistory.push({"role": "user", "content": userText});
                conversationHistory.push({"role": "assistant", "content": data.ai_text});
                
                addMessage(data.ai_text, false);
                speakText(data.ai_text);
            } catch (err) {
                addMessage("发送失败，请重试", false);
                console.error(err);
            }
        }

        // ==================== 工具函数 ====================
        function resample(audioData, fromSampleRate, toSampleRate) {
            const ratio = fromSampleRate / toSampleRate;
            const newLength = Math.round(audioData.length / ratio);
            const result = new Float32Array(newLength);
            for (let i = 0; i < newLength; i++) {
                const index = i * ratio;
                const floor = Math.floor(index);
                const ceil = Math.ceil(index);
                const t = index - floor;
                result[i] = ceil >= audioData.length ? audioData[floor] : audioData[floor] * (1 - t) + audioData[ceil] * t;
            }
            return result;
        }

        function createWavBlob(audioData, sampleRate) {
            const buffer = new ArrayBuffer(44 + audioData.length * 2);
            const view = new DataView(buffer);
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + audioData.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, audioData.length * 2, true);

            let offset = 44;
            for (let i = 0; i < audioData.length; i++) {
                const sample = Math.max(-1, Math.min(1, audioData[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }
            return new Blob([view], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // 绑定事件
        recordBtn.addEventListener("click", startRecording);
        sendTextBtn.addEventListener("click", sendTextMessage);
        textInput.addEventListener("keypress", (e) => e.key === "Enter" && sendTextMessage());
        sceneSelect.addEventListener("change", () => {
            // 切换场景时清空聊天和翻译记录
            chatBox.innerHTML = "";
            translateBox.innerHTML = "";
            conversationHistory = [];
            initScene();
        });

        // 页面初始化
        initScene();
    </script>
</body>
</html>
