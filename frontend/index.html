<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SceneTalk 英语口语练习</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="nav-item active" data-page="practice">
                * SceneTalk
            </div>
            <div class="nav-item" data-page="notes">
                &mdash; 单词笔记
            </div>
            <div class="nav-item" data-page="dialogues">
                &mdash; 情景对话
            </div>
            <div class="nav-item" data-page="sentences">
                &mdash; 句子收藏
            </div>
        </aside>

        <main class="main-content">
            <div id="practice-page" class="page active">
                <h1>SceneTalk &mdash; 英语口语练习</h1>
                <div class="container">
                    <!-- 左侧面板：场景对话 -->
                    <div class="panel" id="leftPanel">
                        <div class="scene-bar">
                            <select id="sceneSelect">
                                <option value="0">英语自由交流</option>
                                <option value="1">餐厅点餐用餐</option>
                                <option value="2">职场英文面试</option>
                                <option value="3">酒店入住办理</option>
                                <option value="4">日常居家交流</option>
                                <option value="5">出行问路乘车</option>
                                <option value="6">商场购物逛街</option>
                                <option value="7">看病就医问诊</option>
                                <option value="8">校园师生交流</option>
                                <option value="9">日常社交寒暄</option>
                                <option value="10">旅游景点沟通</option>
                                <option value="11">职场工作沟通</option>
                                <option value="12">生活办事咨询</option>
                                <option value="13">电话微信沟通</option>
                                <option value="14">兴趣爱好闲聊</option>
                                <option value="15">机场高铁出行</option>
                                <option value="16">租房看房沟通</option>
                            </select>

                            <span style="margin-left: 15px;">语速：</span>
                            <select id="speechRateSelect">
                                <option value="0.7">慢速</option>
                                <option value="1.0" selected>标准</option>
                                <option value="1.5">快速</option>
                            </select>

                            <button id="toggleTranslatePanelBtn">显示翻译</button>
                        </div>

                        <div class="chat-box" id="chatBox"></div>

                        <div class="input-container">
                            <div class="voice-input">
                                <button id="clearSceneRecordBtn" style="background: var(--accent); color: #fff;">清空记录</button>
                                <span>语音输入</span>

                                <div id="waveform" style="display:none; align-items:center; gap:2px; height:20px; margin:0 8px;">
                                    <span class="wave-bar"></span>
                                    <span class="wave-bar"></span>
                                    <span class="wave-bar"></span>
                                    <span class="wave-bar"></span>
                                    <span class="wave-bar"></span>
                                </div>
                                <span id="recordTimer" style="display:none; color:var(--accent); font-weight:bold; margin:0 8px; font-family:var(--font-mono);">00:00</span>

                                <button id="recordBtn">开始录音</button>
                                <button id="stopBtn">结束并发送</button>
                                <button id="cancelBtn" style="display:none; background:var(--ink-muted); color:#fff;">取消录音</button>
                            </div>

                            <div class="text-input">
                                <span>键盘输入</span>
                                <input type="text" id="textInput">
                                <button id="sendTextBtn">发送</button>
                            </div>
                        </div>
                    </div>

                    <!-- 中间面板：实时翻译 -->
                    <div class="panel" id="translatePanel" style="display:none;">
                        <h3>实时翻译</h3>
                        <div class="translate-box" id="translateBox"></div>
                    </div>

                    <!-- 右侧面板：单词查询/句子翻译 -->
                    <div class="panel">
                        <div class="mode-toggle" style="margin-bottom:15px; display:flex; gap:10px;">
                            <button id="toggleWordBtn" class="toggle-btn active" style="flex:1; padding:8px; border:1px solid var(--accent-cool); border-radius:3px; background:var(--accent-cool); color:#fff; font-family:var(--font-mono); font-size:12px; letter-spacing:0.04em;">单词查询</button>
                            <button id="toggleTranslateBtn" class="toggle-btn" style="flex:1; padding:8px; border:1px solid var(--line); border-radius:3px; background:var(--paper-light); color:var(--ink); font-family:var(--font-mono); font-size:12px; letter-spacing:0.04em;">句子翻译</button>
                        </div>

                        <div id="wordQueryModule" class="module">
                            <div class="word-input-area">
                                <input type="text" id="wordInput" placeholder="输入英文单词">
                                <button id="searchWordBtn">查询</button>
                            </div>
                            <div class="word-result" id="wordResult"></div>
                        </div>

                        <div id="sentenceTranslateModule" class="module" style="display:none;">
                            <div class="translate-input-area" style="display:flex; gap:10px; margin-bottom:15px;">
                                <input type="text" id="translateInput" placeholder="输入中文句子">
                                <button id="translateBtn">翻译</button>
                            </div>
                            <div class="translate-result-area" style="background:var(--paper-light); border-radius:3px; padding:15px; min-height:80px; border:1px solid var(--line-light);">
                                <p id="translateResult" style="margin:0; color:var(--ink); line-height:1.6;"></p>
                                <button id="copyTranslateBtn" style="margin-top:10px; padding:6px 12px; background:var(--accent-cool); color:#fff; border:none; border-radius:3px; cursor:pointer; display:none; font-family:var(--font-mono); font-size:11px;">复制译文</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 情景对话范本页面 -->
            <div id="dialogues-page" class="page">
                <h1>情景对话范本</h1>
                <div class="dialogues-container">
                    <div class="dialogue-scene-list">
                        <h3>选择场景</h3>
                        <div class="scene-list-wrapper" id="dialogueSceneList"></div>
                    </div>
                    <div class="dialogue-display">
                        <h2 class="dialogue-title" id="dialogueTitle">请选择一个场景</h2>
                        <div class="dialogue-content" id="dialogueContent"></div>
                    </div>
                </div>
            </div>

            <!-- 单词笔记页面 -->
            <div id="notes-page" class="page">
                <div id="notes-fullscreen-mode" class="notes-mode active">
                    <h2>我的单词笔记</h2>

                    <div class="sort-area">
                        <span>排序方式：</span>
                        <label class="sort-label">
                            <input type="radio" name="sortType" value="time" checked> 按加入时间排序
                        </label>
                        <label class="sort-label">
                            <input type="radio" name="sortType" value="alphabet"> 按字母顺序排序
                        </label>
                        <button id="toggleReciteBtn" style="margin-left:10px; padding:6px 12px; background:var(--accent-cool); color:#fff; border:none; border-radius:3px; cursor:pointer; font-family:var(--font-mono); font-size:11px; letter-spacing:0.03em;">隐藏释义背诵</button>
                    </div>

                    <div style="max-width:900px; width:100%; margin:0 auto 20px; padding:0 20px;">
                        <input type="text" id="wordSearchInput" placeholder="输入英文单词快速搜索..."
                            style="width:100%; padding:12px 15px; border:1px solid var(--line); border-radius:3px; font-size:15px; outline:none; font-family:var(--font-serif); background:var(--surface); color:var(--ink); transition:border-color 0.25s;">
                    </div>

                    <div class="notes-wrapper">
                        <div id="wordNotesList"></div>
                        <div class="notes-actions">
                            <button id="clearAllNotesBtn" class="clear-btn">清空所有笔记</button>
                        </div>
                    </div>
                </div>

                <div id="notes-detail-mode" class="notes-mode">
                    <div class="detail-layout">
                        <div class="detail-left-panel">
                            <h3>我的单词笔记</h3>
                            <div class="sort-area">
                                <span>排序方式：</span>
                                <label class="sort-label">
                                    <input type="radio" name="detailSortType" value="time" checked> 按加入时间排序
                                </label>
                                <label class="sort-label">
                                    <input type="radio" name="detailSortType" value="alphabet"> 按字母顺序排序
                                </label>
                            </div>
                            <div id="detailWordNotesList" class="word-notes-list"></div>
                            <div class="notes-actions">
                                <button id="detailClearBtn" class="clear-btn">清空所有笔记</button>
                            </div>
                        </div>
                        <div class="detail-right-panel">
                            <div class="detail-header">
                                <button id="exitDetailBtn" class="back-btn">返回列表</button>
                            </div>
                            <div id="wordDetailContent" class="detail-content">
                                <div class="empty-detail">
                                    <p>请点击左侧单词，查看完整详情</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 句子收藏页面 -->
            <div id="sentences-page" class="page">
                <h1>我的句子收藏</h1>
                <div style="max-width: 900px; margin: 0 auto; padding: 20px;">
                    <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">
                        <button id="clearAllSentencesBtn" class="clear-btn">清空所有收藏</button>
                    </div>
                    <div id="sentenceCollectionList" style="background: var(--surface); border-radius: 3px; padding: 20px; min-height: 500px; box-shadow: var(--shadow-sm); border: 1px solid var(--paper-edge);">
                        <p style="text-align: center; color: var(--ink-muted);">还没有收藏任何句子，快去聊天或情景对话中收藏吧</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="src/js/utils.js"></script>
    <script src="src/js/api.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
